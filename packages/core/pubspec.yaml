name: open_agenda_core
description: Shared core package for Open Agenda teacher apps - UI components, themes, utilities, and common models
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  
  # Navigation
  go_router: ^14.0.0
  
  # HTTP & API
  dio: ^5.4.0
  retrofit: ^4.1.0
  json_annotation: ^4.8.1
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # UI Components
  flutter_slidable: ^3.0.1
  intl: ^0.19.0
  table_calendar: ^3.0.9
  shimmer: ^3.0.0
  
  # Charts
  fl_chart: ^0.66.0
  
  # PDF Export
  pdf: ^3.10.7
  printing: ^5.11.1
  
  # Utilities
  uuid: ^4.2.2
  freezed_annotation: ^2.4.1
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  retrofit_generator: ^8.1.0
  freezed: ^2.4.6
  hive_generator: ^2.0.1
  mocktail: ^1.0.2

flutter:
  uses-material-design: true
  
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto-Light.ttf
          weight: 300
