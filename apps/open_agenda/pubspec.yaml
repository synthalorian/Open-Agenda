name: open_agenda
description: Open Agenda - Comprehensive K-12 educational management app with modern UI/UX
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Internal package
  open_agenda_core:
    path: ../../packages/core
  
  # Direct deps used in app code
  flutter_riverpod: ^2.5.1
  go_router: ^14.0.0
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.0
  fl_chart: ^0.66.0
  table_calendar: ^3.0.9
  flutter_slidable: ^3.0.1
  uuid: ^4.2.2
  intl: ^0.19.0
  printing: ^5.11.1

  # Platform
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.2

flutter_native_splash:
  color: "#0F051E"
  image: "assets/icons/app_icon.png"
  android: true
  ios: true
  android_12:
    color: "#0F051E"
    image: "assets/icons/app_icon.png"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#0F051E"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
